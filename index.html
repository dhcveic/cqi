<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>교과목 CQI 실시 현황 | 대구보건대학교 직업교육혁신센터</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, -apple-system, 'Malgun Gothic', sans-serif; background: #EEF2F7; color: #1E293B; }
  ::-webkit-scrollbar { width: 7px; height: 7px; }
  ::-webkit-scrollbar-track { background: #f1f5f9; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

  header {
    background: #0F2B56; color: #fff; padding: 16px 28px;
    display: flex; justify-content: space-between; align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.2); flex-wrap: wrap; gap: 10px;
  }
  .h-sub { font-size: 11px; opacity: .55; letter-spacing: .8px; margin-bottom: 4px; }
  .h-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; }
  .h-right { display: flex; align-items: center; gap: 14px; }
  .h-date { font-size: 12px; opacity: .7; text-align: right; line-height: 1.5; }
  .h-date strong { font-size: 13px; opacity: 1; }
  .btn-refresh {
    padding: 7px 14px; border-radius: 8px; cursor: pointer; font-size: 13px;
    border: 1px solid rgba(255,255,255,.3); background: rgba(255,255,255,.1); color: #fff; font-weight: 500;
  }
  .btn-refresh:hover { background: rgba(255,255,255,.2); }

  .notice {
    background: #FEF9E7; border-bottom: 1px solid #F6E5A6; color: #8A6D0B;
    font-size: 12.5px; padding: 9px 28px; text-align: center;
  }
  .wrap { padding: 22px 28px; max-width: 1500px; margin: 0 auto; }

  .track-tabs { display: flex; gap: 6px; margin-bottom: 18px; }
  .track-tab {
    padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid #E5E7EB; background: #fff; color: #6B7280; transition: all .12s;
  }
  .track-tab:hover { border-color: #93C5FD; }
  .track-tab.active { background: #0F2B56; border-color: #0F2B56; color: #fff; }
  .track-tab .t-cnt { font-weight: 400; opacity: .75; margin-left: 4px; }

  .cards { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; margin-bottom: 22px; }
  .card { border-radius: 14px; padding: 18px 22px; border: 1px solid; }
  .card .c-label { font-size: 12px; color: #6B7280; font-weight: 500; margin-bottom: 6px; }
  .card .c-val { font-size: 30px; font-weight: 900; line-height: 1; letter-spacing: -1px; }
  .card .c-sub { font-size: 12px; color: #9CA3AF; margin-top: 6px; }

  .layout { display: grid; grid-template-columns: 300px 1fr; gap: 18px; align-items: start; }
  .panel { background: #fff; border-radius: 14px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
  .side { padding: 18px 14px; }
  .side h2 { font-size: 14px; font-weight: 700; color: #0F2B56; margin-bottom: 14px; }
  .dept-list { max-height: 620px; overflow-y: auto; }
  .dept-item { padding: 8px 10px; border-radius: 8px; margin-bottom: 3px; cursor: pointer; border: 1px solid transparent; transition: all .12s; }
  .dept-item:hover { background: #F1F5F9; }
  .dept-item.active { background: #EBF4FE; border-color: #93C5FD; }
  .dept-row1 { display: flex; justify-content: space-between; margin-bottom: 5px; }
  .dept-name { font-size: 12px; color: #1E293B; line-height: 1.3; }
  .dept-item.active .dept-name { font-weight: 600; }
  .dept-rate { font-size: 12px; font-weight: 700; margin-left: 6px; white-space: nowrap; }
  .bar { height: 4px; background: #F3F4F6; border-radius: 2px; overflow: hidden; }
  .bar > div { height: 100%; border-radius: 2px; }
  .dept-cnt { font-size: 11px; color: #9CA3AF; margin-top: 3px; }

  .main { padding: 20px 22px; min-height: 520px; }
  .main-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
  .main-head h2 { font-size: 15px; font-weight: 700; color: #0F2B56; margin-bottom: 4px; }
  .main-head .meta { font-size: 13px; color: #6B7280; }
  .controls { display: flex; gap: 8px; flex-shrink: 0; }
  select, button { font-family: inherit; }
  select { padding: 7px 12px; border-radius: 8px; border: 1px solid #E5E7EB; font-size: 13px; color: #374151; cursor: pointer; background: #fff; }
  .btn { padding: 7px 14px; border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; }
  .btn.active { font-weight: 700; border-color: #FCA5A5; background: #FEF2F2; color: #D93025; }
  .btn-print { border-color: #93C5FD; background: #EFF6FF; color: #1D4ED8; font-weight: 600; }
  .btn-print:hover { background: #DBEAFE; }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; background: #fff; padding: 9px 10px; text-align: left; font-size: 12px; font-weight: 600; color: #6B7280; border-bottom: 2px solid #E5E7EB; z-index: 1; }
  tbody td { padding: 9px 10px; border-bottom: 1px solid #F3F4F6; }
  tbody tr:nth-child(even) { background: #FAFAFA; }
  .subj-name { color: #111827; font-weight: 500; }
  .track-badge { display:inline-block; padding:1px 6px; border-radius:4px; font-size:10px; font-weight:600; margin-left:5px; vertical-align:1px; white-space:nowrap; }
  .track-badge.b-major { background:#F5F3FF; color:#6D28D9; border:1px solid #DDD6FE; }
  .track-badge.b-track { background:#ECFEFF; color:#0E7490; border:1px solid #A5F3FC; }
  .search-input {
    padding: 7px 12px; border-radius: 8px; border: 1px solid #E5E7EB;
    font-size: 13px; color: #374151; width: 150px; font-family: inherit;
  }
  .search-input:focus { outline: none; border-color: #93C5FD; }
  .tag { padding: 2px 7px; border-radius: 4px; font-size: 11px; user-select: none; display: inline-block; }
  .tag.done { background: #DCFCE7; color: #15803D; border: 1px solid #BBF7D0; }
  .tag.undone { background: #FEF2F2; color: #B91C1C; border: 1px solid #FECACA; }
  .tags-wrap { display: flex; flex-wrap: wrap; gap: 3px; }
  .res-done { color: #1A9B5C; font-weight: 700; font-size: 12px; }
  .res-undone { color: #D93025; font-weight: 700; font-size: 12px; }
  .res-part { color: #D97706; font-weight: 700; font-size: 12px; }
  .table-scroll { overflow-y: auto; max-height: 560px; }
  .empty { padding: 56px 0; text-align: center; color: #9CA3AF; font-size: 14px; }

  .overview-prog { background: #F8FAFC; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; }
  .ov-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-height: 460px; overflow-y: auto; }
  .ov-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 10px; padding: 12px 14px; cursor: pointer; transition: all .15s; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .ov-card:hover { border-color: #93C5FD; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .ov-name { font-size: 12px; font-weight: 600; color: #1E293B; margin-bottom: 8px; line-height: 1.4; }
  .ov-foot { display: flex; justify-content: space-between; align-items: center; }
  .ov-rate { font-size: 18px; font-weight: 800; }
  .ov-cnt { font-size: 11px; color: #9CA3AF; }

  .prof-bar { margin-bottom: 14px; }
  .prof-bar-label { font-size: 11px; color: #9CA3AF; font-weight: 600; letter-spacing: .5px; margin-bottom: 7px; }
  .prof-chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .prof-chip {
    padding: 5px 12px; border-radius: 20px; font-size: 12px; cursor: pointer;
    border: 1px solid #E5E7EB; background: #fff; color: #374151;
    transition: all .12s; white-space: nowrap;
  }
  .prof-chip:hover { border-color: #93C5FD; background: #EFF6FF; }
  .prof-chip.active { background: #0F2B56; border-color: #0F2B56; color: #fff; font-weight: 700; }
  .prof-chip .p-undone { font-size: 10px; margin-left: 3px; opacity: .8; }
  .prof-chip.has-undone { border-color: #FCA5A5; }
  .prof-chip.has-undone.active { background: #0F2B56; border-color: #0F2B56; }

  /* 링크 목록 모달 */
  .modal-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:1000; align-items:center; justify-content:center; }
  .modal-bg.open { display:flex; }
  .modal { background:#fff; border-radius:16px; width:620px; max-height:80vh; overflow:hidden; display:flex; flex-direction:column; }
  .modal-head { padding:20px 24px 16px; border-bottom:1px solid #E5E7EB; display:flex; justify-content:space-between; align-items:center; }
  .modal-head h3 { font-size:15px; font-weight:700; color:#0F2B56; margin:0; }
  .modal-close { background:none; border:none; font-size:20px; cursor:pointer; color:#6B7280; line-height:1; }
  .modal-body { padding:16px 24px; overflow-y:auto; flex:1; }
  .modal-note { font-size:12px; color:#6B7280; margin-bottom:14px; line-height:1.6; }
  .link-row { display:flex; align-items:center; gap:8px; padding:8px 0; border-bottom:1px solid #F3F4F6; }
  .link-dept { font-size:13px; color:#1E293B; font-weight:500; width:160px; flex-shrink:0; }
  .link-url { font-size:11px; color:#6B7280; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:monospace; }
  .link-copy { padding:4px 10px; border-radius:6px; border:1px solid #E5E7EB; background:#fff; font-size:11px; cursor:pointer; flex-shrink:0; color:#374151; }
  .link-copy:hover { background:#F0FDF4; border-color:#BBF7D0; color:#15803D; }
  .btn-link { padding:7px 14px; border-radius:8px; font-size:13px; cursor:pointer; border:1px solid rgba(255,255,255,.3); background:rgba(255,255,255,.12); color:#fff; font-weight:500; }

  .state { padding: 80px 20px; text-align: center; color: #6B7280; }
  .state .spinner { width: 40px; height: 40px; border: 4px solid #E5E7EB; border-top-color: #0F2B56; border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .state h3 { font-size: 16px; color: #374151; margin-bottom: 8px; }
  .state p { font-size: 13px; line-height: 1.6; }
  .state code { background: #F3F4F6; padding: 2px 6px; border-radius: 4px; font-size: 12px; }

  #printArea { display: none; }
  @media print {
    body { background: #fff; }
    header, .notice, .wrap { display: none !important; }
    #printArea { display: block !important; }
    .pr-head { text-align: center; margin-bottom: 6px; }
    .pr-title { font-size: 20px; font-weight: 800; color: #000; }
    .pr-sub { font-size: 12px; color: #555; margin-top: 4px; }
    .pr-summary { font-size: 13px; margin: 14px 0; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; }
    .pr-summary strong { font-size: 15px; }
    table { font-size: 11px; }
    thead th { background: #f0f0f0 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; border-bottom: 1px solid #999; }
    .tag { border: 1px solid #999 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .tag.undone { background: #fff !important; }
    tbody tr { break-inside: avoid; }
    @page { margin: 14mm; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="h-sub">대구보건대학교 · 직업교육혁신센터</div>
    <div class="h-title">교과목 CQI 실시 현황 · 2026학년도 1학기</div>
  </div>
  <div class="h-right">
    <div class="h-date" id="updateInfo">데이터 불러오는 중…</div>
    <button class="btn-link" id="btnLinks" style="display:none;" onclick="showLinks()">🔗 학과별 링크</button>
    <button class="btn-refresh" onclick="loadData()">↻ 새로고침</button>
  </div>
</header>

<!-- 학과별 링크 모달 -->
<div class="modal-bg" id="linkModal" onclick="if(event.target===this)closeLinkModal()">
  <div class="modal">
    <div class="modal-head">
      <h3>🔗 학과별 전용 링크 목록</h3>
      <button class="modal-close" onclick="closeLinkModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-note">
        각 조교 선생님에게 아래 링크를 전달하면, 본인 학과 현황만 볼 수 있습니다.<br>
        링크를 복사하여 이메일·메신저로 공유하세요.
      </div>
      <div id="linkList"></div>
    </div>
  </div>
</div>

<div class="notice">
  📌 본 현황은 직업교육혁신센터에서 실시간으로 업데이트합니다 (일반과정 · 전공심화 · 대학원). 최신 현황은 우측 상단 <b>↻ 새로고침</b> 버튼을 누르거나 페이지를 새로고침(F5)하면 반영됩니다.
</div>

<div class="wrap" id="wrap">
  <div class="state"><div class="spinner"></div><h3>현황 데이터를 불러오는 중입니다</h3><p>잠시만 기다려 주세요.</p></div>
</div>

<div id="printArea"></div>

<script>
// ─────────────────────────────────────────────────────────────
//  데이터 파일 위치: 같은 폴더의 아래 3개 파일을 자동으로 읽습니다.
//   - data.xlsx          → 일반과정 (기존 학부 정규과정)
//   - data_전공심화.xlsx   → 전공심화과정
//   - data_대학원.xlsx     → 대학원과정
//  매일 다운로드한 엑셀을 위 이름 그대로 덮어쓰기만 하면 자동 반영됩니다.
//  파일 1개만 갱신해도 되고, 해당 과정에 새 강좌가 없으면 안 올려도 됩니다(이전 파일 유지).
// ─────────────────────────────────────────────────────────────

// URL 파라미터: ?d=코드 → 해당 학과 전용 뷰 (학과명 노출 없는 암호화 코드)
// 코드는 학과명에서 자동 생성되므로 별도 관리 불필요
const _urlParams = new URLSearchParams(window.location.search);
const LOCK_CODE = _urlParams.get('d') || null;
let LOCK_DEPT = null; // 데이터 로딩 후 코드 매칭으로 결정됨

function deptCode(name) {
  // 학과명 → 추측 불가능한 고정 코드 (예: c1x9k2)
  let h = 5381;
  for (let i = 0; i < name.length; i++) {
    h = ((h * 33) ^ name.charCodeAt(i)) >>> 0;
  }
  return "c" + h.toString(36);
}
const DATA_FILES = [
  { file: "data.xlsx",          track: "일반과정" },
  { file: "data_전공심화.xlsx",   track: "전공심화" },
  { file: "data_대학원.xlsx",     track: "대학원" }
];

let DATA = [];
let TRACK_LOADED = {};      // { 트랙명: true/false } 로딩 성공 여부
let TRACK_STAMP = {};       // { 트랙명: 마지막 수정시각 문자열 }
let curTrack = "전체";
let curDept = "전체";
let curProf = "";           // 선택된 교수명 ("" = 전체)
let curSearch = "";         // 과목명 검색어 (학과 화면)
let ovSearch = "";          // 전체 화면 검색어
let ovUndoneOnly = false;   // 전체 화면 미실시 목록 모드
let undoneOnly = false;
let CURRENT_SUBJECTS = [];  // 현재 렌더링된 학과의 과목 목록 (검색용)

const isDone = v => String(v||"").trim().toUpperCase() === "O";
const pct = (d,t) => t ? +(d/t*100).toFixed(1) : 0;
const rateColor = r => r>=80 ? "#1A9B5C" : r>=50 ? "#D97706" : r>0 ? "#D93025" : "#9CA3AF";

async function loadData() {
  const wrap = document.getElementById("wrap");
  document.getElementById("updateInfo").textContent = "데이터 불러오는 중…";
  wrap.innerHTML = '<div class="state"><div class="spinner"></div><h3>현황 데이터를 불러오는 중입니다</h3><p>잠시만 기다려 주세요.</p></div>';

  DATA = [];
  TRACK_LOADED = {};
  TRACK_STAMP = {};
  const failedTracks = [];
  let latestStamp = null;

  for (const { file, track } of DATA_FILES) {
    try {
      const res = await fetch(file + "?t=" + Date.now());
      if (!res.ok) throw new Error(String(res.status));
      const buf = await res.arrayBuffer();
      const wb = XLSX.read(new Uint8Array(buf), { type: "array", cellDates: true });
      const sheet = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });

      rows.forEach(r => {
        DATA.push({
          과정: track,
          학과: String(r["학과"] != null ? r["학과"] : "미분류").trim() || "미분류",
          전공: String(r["전공"] != null ? r["전공"] : "").trim(),
          학년: String(r["학년"] != null ? r["학년"] : "").trim(),
          과목코드: String(r["과목코드"] != null ? r["과목코드"] : "").trim(),
          과목명: String(r["과목명"] != null ? r["과목명"] : "").trim(),
          수강반: String(r["수강반"] != null ? r["수강반"] : "").trim(),
          교수명: String(r["교수명"] != null ? r["교수명"] : "").trim(),
          평가여부: String(r["평가여부"] != null ? r["평가여부"] : "").trim().toUpperCase()
        });
      });

      TRACK_LOADED[track] = true;
      const lastMod = res.headers.get("last-modified");
      const d = lastMod ? new Date(lastMod) : new Date();
      TRACK_STAMP[track] = fmtDateTime(d);
      if (!latestStamp || d > latestStamp) latestStamp = d;
    } catch (e) {
      TRACK_LOADED[track] = false;
      failedTracks.push(track);
    }
  }

  if (DATA.length === 0) {
    document.getElementById("updateInfo").textContent = "불러오기 실패";
    wrap.innerHTML = '<div class="state">' +
      '<h3 style="color:#D93025;">⚠ 데이터를 불러올 수 없습니다</h3>' +
      '<p>저장소에 <code>data.xlsx</code>, <code>data_전공심화.xlsx</code>, <code>data_대학원.xlsx</code> 파일이 있는지 확인해 주세요.</p></div>';
    return;
  }

  // 학과 전용 코드 해석
  if (LOCK_CODE) {
    const allDepts = [...new Set(DATA.map(r => r["학과"]))];
    LOCK_DEPT = allDepts.find(d => deptCode(d) === LOCK_CODE) || null;
    if (!LOCK_DEPT) {
      document.getElementById("updateInfo").textContent = "";
      wrap.innerHTML = '<div class="state">' +
        '<h3 style="color:#D93025;">⚠ 유효하지 않은 링크입니다</h3>' +
        '<p>학과 전용 링크가 잘못되었거나 만료되었습니다.<br>직업교육혁신센터로 문의해 주세요.</p></div>';
      return;
    }
  }

  let info = "최종 업데이트<br><strong>" + fmtDateTime(latestStamp) + "</strong>";
  if (failedTracks.length) info += "<br><span style='color:#FCA5A5;'>⚠ " + failedTracks.join("·") + " 파일 없음</span>";
  document.getElementById("updateInfo").innerHTML = info;

  curTrack = "전체";
  curDept = LOCK_DEPT || "전체";
  curProf = "";
  undoneOnly = false;

  // 관리자 모드일 때만 링크 버튼 표시
  const btnLinks = document.getElementById("btnLinks");
  if (btnLinks) btnLinks.style.display = LOCK_DEPT ? "none" : "inline-block";

  buildLayout();
  render();
}

function fmtDateTime(d) {
  const days = ["일","월","화","수","목","금","토"];
  const yy = d.getFullYear(), mm = d.getMonth()+1, dd = d.getDate();
  let h = d.getHours(); const min = String(d.getMinutes()).padStart(2,"0");
  const ap = h < 12 ? "오전" : "오후"; h = h % 12; if (h === 0) h = 12;
  return yy + ". " + mm + ". " + dd + ". (" + days[d.getDay()] + ") " + ap + " " + h + ":" + min;
}

function trackFilteredData() {
  return curTrack === "전체" ? DATA : DATA.filter(r => r.과정 === curTrack);
}

function buildLayout() {
  if (LOCK_DEPT) {
    // 학과 전용 모드: 과정 탭·사이드바 없음, 와이드 메인 패널

  const tabsHtml = tracks.map(t => {

function deptStats() {
  const m = {};
  const order = []; // 엑셀에 나온 학과 순서 그대로 유지
  trackFilteredData().forEach(r => {
    const d = r["학과"] || "미분류";
    if (!m[d]) { m[d] = { total:0, done:0 }; order.push(d); }
    m[d].total++;
    if (isDone(r["평가여부"])) m[d].done++;
  });
  return order.map(name => ({
    name, total:m[name].total, done:m[name].done,
    undone:m[name].total-m[name].done, rate:pct(m[name].done,m[name].total)
  }));
}

function profsOfDept(dept) {
  const base = trackFilteredData();
  const rows = dept === "전체" ? base : base.filter(r => r["학과"] === dept);
  // 교수명별 완료/미완료 수 집계
  const m = {};
  rows.forEach(r => {
    const p = r["교수명"] || "미정";
    if (!m[p]) m[p] = { total:0, undone:0 };
    m[p].total++;
    if (!isDone(r["평가여부"])) m[p].undone++;
  });
  return Object.entries(m)
    .map(([name, v]) => ({ name, total:v.total, undone:v.undone }))
    .sort((a,b) => a.name.localeCompare(b.name));
}

function subjectsOf(dept, profFilter) {
  const base = trackFilteredData();
  let rows = dept === "전체" ? base : base.filter(r => r["학과"] === dept);
  // 교수 필터가 있으면 해당 교수 행만
  if (profFilter) rows = rows.filter(r => r["교수명"] === profFilter);
  const m = {};
  rows.forEach(r => {
    const k = (r["학과"]||"")+"§"+(r["과목코드"]||"")+"§"+(r["학년"]||"")+"§"+(r["과목명"]||"");
    if (!m[k]) m[k] = { 학과:r["학과"], 과목명:r["과목명"], 학년:r["학년"], sections:[] };
    m[k].sections.push({ 반:r["수강반"], 교수:r["교수명"], done:isDone(r["평가여부"]) });
  });
  return Object.values(m).sort((a,b) =>
    String(a.학년).localeCompare(String(b.학년)) || String(a.과목명).localeCompare(String(b.과목명))
  );
}

function renderCards() {
  let base;
  if (LOCK_DEPT) {
    // 학과 전용 모드: 해당 학과 데이터 전체(과정 무관)
    base = DATA.filter(r => r["학과"] === LOCK_DEPT);
  } else {
    base = trackFilteredData();
  }
  const ds = LOCK_DEPT ? null : deptStats();

  const cards = [
    { label:"총 강좌 수 ("+trackLabel+")", val:total.toLocaleString()+"개", sub:subLabel, c:"#0F2B56", bg:"#EBF4FE" },
    { label:"CQI 완료", val:done.toLocaleString()+"개", sub:"전체의 "+rate+"%", c:"#1A9B5C", bg:"#F0FDF4" },

  // 과목 목록 (교수 필터 적용) - LOCK_DEPT 모드는 DATA 전체 기준

    if (!m[k]) m[k] = { 과목명:r["과목명"], 학년:r["학년"], 전공:r["전공"]||"", 과정:r["과정"]||"", sections:[] };
    m[k].sections.push({ 반:r["수강반"], 교수:r["교수명"], done:isDone(r["평가여부"]) });
  });
  const subjects = Object.values(m).sort((a,b) =>
    String(a.학년).localeCompare(String(b.학년)) || String(a.과목명).localeCompare(String(b.과목명))

  CURRENT_SUBJECTS = subjects;

  // 요약 통계
  const profRows = curProf ? deptRowsAll.filter(r => r["교수명"] === curProf) : deptRowsAll;
  const profTotal = profRows.length, profDone = profRows.filter(r => isDone(r["평가여부"])).length;
  const profUndone = profTotal - profDone, profRate = pct(profDone, profTotal);

    : profTotal+'개 강좌 · <span style="color:#1A9B5C;font-weight:600;">완료 '+profDone+'개</span> · <span style="color:#D93025;font-weight:600;">미실시 '+profUndone+'개</span> · 실시율 <strong style="color:'+rateColor(profRate)+';">'+profRate+'%</strong>';

// 표 행 HTML 생성 (undoneOnly + 검색어 반영)
function buildRowsHtml() {
  let shown = CURRENT_SUBJECTS;
  if (undoneOnly) shown = shown.filter(s => s.sections.some(x => !x.done));
  if (curSearch) {
    const q = curSearch.toLowerCase();
    shown = shown.filter(s => String(s.과목명).toLowerCase().includes(q));
  }

  let rows = shown.map(subj => {
    const sDone = subj.sections.filter(s=>s.done).length, sTotal = subj.sections.length;
    const all = sDone===sTotal, none = sDone===0;

    // 미실시만 모드: 완료 분반 태그는 숨기고 미실시만 표시
    const visibleSecs = undoneOnly ? subj.sections.filter(s => !s.done) : subj.sections;
    const tags = visibleSecs.map(s =>
      '<span class="tag '+(s.done?"done":"undone")+'" title="'+s.반+'반 · '+s.교수+'">'+s.반+' '+s.교수+'</span>'
    ).join("");

    const res = undoneOnly
      ? '<span class="res-undone">미실시 '+(sTotal-sDone)+'개</span>'
      : (all ? '<span class="res-done">✓ 완료</span>'
        : none ? '<span class="res-undone">미실시</span>'
        : '<span class="res-part">'+sDone+'/'+sTotal+' 부분</span>');

    // 전공(소단위 과정) 뱃지 + 과정 뱃지
    let badges = "";
    if (subj.전공 && subj.전공 !== "학사학위 전공심화과정") {
      badges += '<span class="track-badge b-major">'+subj.전공+'</span>';
    }
    if ((LOCK_DEPT || curTrack === "전체") && subj.과정 && subj.과정 !== "일반과정") {
      badges += '<span class="track-badge b-track">'+subj.과정+'</span>';
    }

    return '<tr><td class="subj-name">'+subj.과목명+badges+'</td><td style="color:#6B7280;">'+subj.학년+'학년</td>'+
           '<td><div class="tags-wrap">'+tags+'</div></td><td>'+res+'</td></tr>';
  }).join("");

  if (!shown.length) rows = '<tr><td colspan="4" class="empty">'+
    (curSearch ? "🔍 검색 결과가 없습니다"
    : undoneOnly ? "🎉 모든 과목이 완료되었습니다!" : "데이터가 없습니다")+'</td></tr>';
  return rows;
}

// 검색: 표만 갱신 (입력 포커스 유지)
function searchSubjects(v) {

// 전체 미실시 목록 (학과·과정 전체에서 미실시만 추림)
function buildOvUndoneList() {
  const base = trackFilteredData().filter(r => !isDone(r["평가여부"]));
  if (!base.length) return '<div class="empty">🎉 모든 강좌가 완료되었습니다!</div>';

  // 학과 원본 순서 유지 + 과목 그룹핑
  const m = {}; const order = [];
  base.forEach(r => {
    const k = (r["학과"]||"")+"§"+(r["과정"]||"")+"§"+(r["전공"]||"")+"§"+(r["과목코드"]||"")+"§"+(r["학년"]||"")+"§"+(r["과목명"]||"");
    if (!m[k]) { m[k] = { 학과:r["학과"], 과목명:r["과목명"], 학년:r["학년"], 전공:r["전공"]||"", 과정:r["과정"]||"", secs:[] }; order.push(k); }
    m[k].secs.push({ 반:r["수강반"], 교수:r["교수명"] });
  });
  const list = order.map(k => m[k]);

  const rows = list.map(s => {
    const tags = s.secs.map(x => '<span class="tag undone">'+x.반+' '+x.교수+'</span>').join("");
    let badges = "";
    if (s.전공 && s.전공 !== "학사학위 전공심화과정") badges += '<span class="track-badge b-major">'+s.전공+'</span>';
    if (curTrack === "전체" && s.과정 && s.과정 !== "일반과정") badges += '<span class="track-badge b-track">'+s.과정+'</span>';
    return '<tr>'+
      '<td style="color:#6B7280;font-size:12px;">'+s.학과+'</td>'+
      '<td class="subj-name">'+s.과목명+badges+'</td>'+
      '<td style="color:#6B7280;">'+s.학년+'학년</td>'+
      '<td><div class="tags-wrap">'+tags+'</div></td>'+
      '<td style="text-align:center;"><span class="res-undone">'+s.secs.length+'개</span></td></tr>';
  }).join("");

  return '<div style="font-size:13px;color:#6B7280;margin-bottom:10px;">미실시 <strong style="color:#D93025;">'+base.length.toLocaleString()+'개 강좌</strong> · '+list.length.toLocaleString()+'개 과목</div>'+
    '<div class="table-scroll"><table><thead><tr>'+
    '<th style="width:16%;">학과</th><th style="width:26%;">과목명</th><th style="width:7%;">학년</th>'+
    '<th style="width:41%;">미실시 분반 · 교수</th><th style="width:10%;">미실시</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>';
}

// 전체 미실시 목록 인쇄
function printOvUndone() {
  const base = trackFilteredData().filter(r => !isDone(r["평가여부"]));
  const m = {}; const order = [];
  base.forEach(r => {
    const k = (r["학과"]||"")+"§"+(r["과정"]||"")+"§"+(r["전공"]||"")+"§"+(r["과목코드"]||"")+"§"+(r["학년"]||"")+"§"+(r["과목명"]||"");
    if (!m[k]) { m[k] = { 학과:r["학과"], 과목명:r["과목명"], 학년:r["학년"], 전공:r["전공"]||"", secs:[] }; order.push(k); }
    m[k].secs.push(r["수강반"]+"반 · "+r["교수명"]);
  });
  const list = order.map(k => m[k]);
  const updateInfo = document.getElementById("updateInfo").innerHTML.replace(/<[^>]+>/g,"").replace("최종 업데이트","").trim();

  let rows = list.map(s => {
    const majorTxt = (s.전공 && s.전공 !== "학사학위 전공심화과정")
      ? '<br><span style="font-size:9px;color:#666;">('+s.전공+')</span>' : '';
    return '<tr><td>'+s.학과+'</td><td>'+s.과목명+majorTxt+'</td><td>'+s.학년+'학년</td><td>'+
      s.secs.map(t=>'<span class="tag undone">'+t+'</span>').join(" ")+
      '</td><td style="text-align:center;">'+s.secs.length+'개</td></tr>';
  }).join("");
  if (!rows) rows = '<tr><td colspan="5" style="text-align:center;padding:30px;">미실시 과목이 없습니다.</td></tr>';

  document.getElementById("printArea").innerHTML =
    '<div class="pr-head"><div class="pr-title">전체 학과 교과목 CQI 미실시 현황</div>'+
    '<div class="pr-sub">대구보건대학교 직업교육혁신센터 · '+(curTrack==="전체"?"전체 과정":curTrack)+' · 2026학년도 1학기 · 최종 업데이트 '+updateInfo+'</div></div>'+
    '<div class="pr-summary">전체 미실시 <strong style="color:#D93025;">'+base.length.toLocaleString()+'개 강좌</strong> ('+list.length.toLocaleString()+'개 과목) · 아래는 학과별 미실시 분반 목록입니다.</div>'+
    '<table><thead><tr><th style="width:14%;">학과</th><th style="width:26%;">과목명</th><th style="width:8%;">학년</th>'+
    '<th style="width:42%;">미실시 분반 · 교수</th><th style="width:10%;">미실시</th></tr></thead><tbody>'+rows+'</tbody></table>';
  window.print();
}

// 전체 화면: 기본 뷰 (진행률 + 미니 차트 + 학과 그리드)
function buildOvNormal() {
  const ds = deptStats();
  const total = ds.reduce((s,d)=>s+d.total,0), done = ds.reduce((s,d)=>s+d.done,0);
  const overall = pct(done,total);

  // 과정별 실시율 (전체 탭에서만 의미 있음)
  let trackChart = "";
  if (curTrack === "전체") {
    const tracks = ["일반과정","전공심화","대학원"];
    const bars = tracks.map(t => {
      const rows = DATA.filter(r => r.과정 === t);
      if (!rows.length) return "";
      const td = rows.filter(r => isDone(r["평가여부"])).length;
      const tr = pct(td, rows.length);
      return '<div style="margin-bottom:8px;">'+
        '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">'+
        '<span style="color:#374151;">'+t+'</span>'+
        '<span style="font-weight:700;color:'+rateColor(tr)+';">'+tr+'% <span style="font-weight:400;color:#9CA3AF;">('+td+'/'+rows.length+')</span></span></div>'+
        '<div class="bar" style="height:7px;"><div style="width:'+tr+'%;min-width:'+(tr>0?3:0)+'px;background:'+rateColor(tr)+';"></div></div></div>';
    }).join("");
    trackChart = '<div style="flex:1;background:#F8FAFC;border-radius:12px;padding:14px 18px;">'+
      '<div style="font-size:12px;font-weight:700;color:#0F2B56;margin-bottom:10px;">📚 과정별 실시율</div>'+bars+'</div>';
  }

  // 학년별 실시율
  const base = trackFilteredData();
  const grades = [...new Set(base.map(r => r["학년"]))].sort();
  const gradeBars = grades.map(g => {
    const rows = base.filter(r => r["학년"] === g);
    const gd = rows.filter(r => isDone(r["평가여부"])).length;
    const gr = pct(gd, rows.length);
    return '<div style="margin-bottom:8px;">'+
      '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px;">'+
      '<span style="color:#374151;">'+g+'학년</span>'+
      '<span style="font-weight:700;color:'+rateColor(gr)+';">'+gr+'% <span style="font-weight:400;color:#9CA3AF;">('+gd+'/'+rows.length+')</span></span></div>'+
      '<div class="bar" style="height:7px;"><div style="width:'+gr+'%;min-width:'+(gr>0?3:0)+'px;background:'+rateColor(gr)+';"></div></div></div>';
  }).join("");
  const gradeChart = '<div style="flex:1;background:#F8FAFC;border-radius:12px;padding:14px 18px;">'+
    '<div style="font-size:12px;font-weight:700;color:#0F2B56;margin-bottom:10px;">🎓 학년별 실시율</div>'+gradeBars+'</div>';

  return (
    '<div class="overview-prog"><div style="display:flex;justify-content:space-between;margin-bottom:10px;">'+
    '<span style="font-size:13px;font-weight:600;color:#374151;">전체 진행률</span>'+
    '<span style="font-size:14px;font-weight:800;color:'+rateColor(overall)+';">'+overall+'%</span></div>'+
    '<div style="height:10px;background:#E5E7EB;border-radius:5px;overflow:hidden;"><div style="height:100%;width:'+overall+'%;background:linear-gradient(90deg,#1A9B5C,#22D97A);border-radius:5px;"></div></div>'+
    '<div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:#9CA3AF;"><span>완료 '+done.toLocaleString()+'개</span><span>미실시 '+(total-done).toLocaleString()+'개</span></div></div>'+
    '<div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">'+trackChart+gradeChart+'</div>'+
    '<div class="ov-grid">'+ds.map(d =>
      '<div class="ov-card" onclick="selectDept(\''+d.name.replace(/'/g,"\\'")+'\')">'+
      '<div class="ov-name">'+d.name+'</div>'+
      '<div class="bar" style="margin-bottom:8px;"><div style="width:'+d.rate+'%;min-width:'+(d.rate>0?3:0)+'px;background:'+rateColor(d.rate)+';"></div></div>'+
      '<div class="ov-foot"><span class="ov-rate" style="color:'+rateColor(d.rate)+';">'+d.rate+'%</span>'+
      '<span class="ov-cnt">'+d.done+'/'+d.total+'개</span></div></div>'
    ).join("")+'</div>'
  );
}

// 전체 화면: 검색 결과 (과목명 · 교수명, 전 학과 대상)
function buildOvSearchResults() {
  const q = ovSearch.trim().toLowerCase();
  const base = trackFilteredData();
  const hits = base.filter(r =>
    String(r["과목명"]).toLowerCase().includes(q) ||
    String(r["교수명"]).toLowerCase().includes(q)
  );

  // 과목 단위 그룹핑
  const m = {};
  const order = [];
  hits.forEach(r => {
    const k = (r["학과"]||"")+"§"+(r["과정"]||"")+"§"+(r["전공"]||"")+"§"+(r["과목코드"]||"")+"§"+(r["학년"]||"")+"§"+(r["과목명"]||"");
    if (!m[k]) { m[k] = { 학과:r["학과"], 과목명:r["과목명"], 학년:r["학년"], 전공:r["전공"]||"", 과정:r["과정"]||"", sections:[] }; order.push(k); }
    m[k].sections.push({ 반:r["수강반"], 교수:r["교수명"], done:isDone(r["평가여부"]) });
  });
  const list = order.map(k => m[k]).slice(0, 150);

  if (!list.length) return '<div class="empty">🔍 "'+ovSearch+'" 검색 결과가 없습니다</div>';

  const rows = list.map(subj => {
    const sDone = subj.sections.filter(s=>s.done).length, sTotal = subj.sections.length;
    const all = sDone===sTotal, none = sDone===0;
    const tags = subj.sections.map(s =>
      '<span class="tag '+(s.done?"done":"undone")+'">'+s.반+' '+s.교수+'</span>'
    ).join("");
    const res = all ? '<span class="res-done">✓ 완료</span>'
              : none ? '<span class="res-undone">미실시</span>'
              : '<span class="res-part">'+sDone+'/'+sTotal+' 부분</span>';
    let badges = "";
    if (subj.전공 && subj.전공 !== "학사학위 전공심화과정") badges += '<span class="track-badge b-major">'+subj.전공+'</span>';
    if (curTrack === "전체" && subj.과정 && subj.과정 !== "일반과정") badges += '<span class="track-badge b-track">'+subj.과정+'</span>';
    return '<tr>'+
      '<td style="color:#6B7280;font-size:12px;">'+subj.학과+'</td>'+
      '<td class="subj-name">'+subj.과목명+badges+'</td>'+
      '<td style="color:#6B7280;">'+subj.학년+'학년</td>'+
      '<td><div class="tags-wrap">'+tags+'</div></td><td>'+res+'</td></tr>';
  }).join("");

  const note = order.length > 150 ? '<div style="font-size:12px;color:#9CA3AF;padding:8px 0;">검색 결과가 많아 상위 150개만 표시합니다. 검색어를 더 구체적으로 입력해 주세요.</div>' : '';

  return '<div style="font-size:13px;color:#6B7280;margin-bottom:10px;">"'+ovSearch+'" 검색 결과 <strong style="color:#0F2B56;">'+order.length+'개 과목</strong></div>'+
    '<div class="table-scroll"><table><thead><tr>'+
    '<th style="width:16%;">학과</th><th style="width:26%;">과목명</th><th style="width:7%;">학년</th>'+
    '<th style="width:38%;">수강반 · 교수</th><th style="width:13%;">결과</th>'+
    '</tr></thead><tbody>'+rows+'</tbody></table></div>'+note;
}

function searchOverview(v) {
  ovSearch = v;
  if (v.trim()) ovUndoneOnly = false;
  const c = document.getElementById("ovContent");
  if (c) c.innerHTML = ovUndoneOnly ? buildOvUndoneList() : (v.trim() ? buildOvSearchResults() : buildOvNormal());
}

function printDept() {
  const activeDept = LOCK_DEPT || curDept;
  if (!activeDept || activeDept === "전체") { alert("학과를 먼저 선택해 주세요."); return; }
  const base = LOCK_DEPT ? DATA : trackFilteredData();
  const deptRows = base.filter(r => r["학과"] === activeDept);
  const profRows = curProf ? deptRows.filter(r => r["교수명"] === curProf) : deptRows;
  const profTotal = profRows.length, profDone = profRows.filter(r=>isDone(r["평가여부"])).length;
  const profUndone = profTotal - profDone, profRate = pct(profDone, profTotal);
  const updateInfo = document.getElementById("updateInfo").innerHTML.replace(/<[^>]+>/g,"").replace("최종 업데이트","").trim();
  const titleSuffix = curProf ? " · " + curProf : "";

  // 미실시 분반만 추출
  let subjRows = base.filter(r => r["학과"] === activeDept && !isDone(r["평가여부"]));
  if (curProf) subjRows = subjRows.filter(r => r["교수명"] === curProf);
  const sm = {};
  subjRows.forEach(r => {
    const k = (r["과정"]||"")+"§"+(r["전공"]||"")+"§"+(r["과목코드"]||"")+"§"+(r["학년"]||"")+"§"+(r["과목명"]||"");
    if (!sm[k]) sm[k] = { 과목명:r["과목명"], 학년:r["학년"], 전공:r["전공"]||"", secs:[] };
    sm[k].secs.push(r["수강반"]+"반 · "+r["교수명"]);
  });
  const undoneSubjects = Object.values(sm).sort((a,b) => String(a.학년).localeCompare(String(b.학년)) || a.과목명.localeCompare(b.과목명));

  let rows = undoneSubjects.map(s => {
    const majorTxt = (s.전공 && s.전공 !== "학사학위 전공심화과정")
      ? '<br><span style="font-size:9px;color:#666;">('+s.전공+')</span>' : '';
    return '<tr><td>'+s.과목명+majorTxt+'</td><td>'+s.학년+'학년</td><td>'+
    s.secs.map(t=>'<span class="tag undone">'+t+'</span>').join(" ")+
    '</td><td style="text-align:center;">'+s.secs.length+'개</td></tr>';
  }).join("");
  if (!rows) rows = '<tr><td colspan="4" style="text-align:center;padding:30px;">미실시 과목이 없습니다.</td></tr>';

  document.getElementById("printArea").innerHTML =
    '<div class="pr-head"><div class="pr-title">'+activeDept+titleSuffix+' 교과목 CQI 미실시 현황</div>'+
    '<div class="pr-sub">대구보건대학교 직업교육혁신센터 · '+(LOCK_DEPT?"전체 과정":(curTrack==="전체"?"전체 과정":curTrack))+' · 2026학년도 1학기 · 최종 업데이트 '+updateInfo+'</div></div>'+
    '<div class="pr-summary">'+profTotal+'개 강좌 중 <strong style="color:#D93025;">미실시 '+profUndone+'개</strong> '+
    '(실시율 '+profRate+'%) · 아래는 미실시 분반 목록입니다.</div>'+
    '<table><thead><tr><th style="width:34%;">과목명</th><th style="width:10%;">학년</th>'+
    '<th style="width:46%;">미실시 분반 · 교수</th><th style="width:10%;">미실시</th></tr></thead><tbody>'+rows+'</tbody></table>';
  window.print();
}

function showLinks() {
  const base = window.location.href.split('?')[0];
  // 엑셀 원본 순서 유지
  const seen = new Set();
  const depts = DATA.map(r => r["학과"]).filter(d => d && !seen.has(d) && seen.add(d));
  document.getElementById("linkList").innerHTML = depts.map((d, i) => {
    const url = base + '?d=' + deptCode(d);
    return '<div class="link-row">'+
      '<div class="link-dept">'+d+'</div>'+
      '<div class="link-url" id="lu'+i+'">'+url+'</div>'+
      '<button class="link-copy" onclick="copyLink(\'lu'+i+'\', this)">복사</button>'+
      '</div>';
  }).join("");
  document.getElementById("linkModal").classList.add("open");
}
function closeLinkModal() { document.getElementById("linkModal").classList.remove("open"); }
function copyLink(id, btn) {
  const text = document.getElementById(id).textContent;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ 복사됨"; btn.style.color="#15803D";
    setTimeout(() => { btn.textContent = "복사"; btn.style.color=""; }, 1500);
  });
}

function selectTrack(t) { curTrack = t; curDept = "전체"; curProf = ""; curSearch = ""; ovSearch = ""; ovUndoneOnly = false; undoneOnly = false; buildLayout(); render(); }
function selectDept(d) { curDept = (d === curDept) ? "전체" : d; curProf = ""; curSearch = ""; ovSearch = ""; ovUndoneOnly = false; undoneOnly = false; render(); }
function selectProf(p) { curProf = (p === curProf) ? "" : p; undoneOnly = false; renderMain(); }
function toggleUndone() { undoneOnly = !undoneOnly; renderMain(); }
function render() { renderCards(); renderSidebar(); renderMain(); }

loadData();
</script>
